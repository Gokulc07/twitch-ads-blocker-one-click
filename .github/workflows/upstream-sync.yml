name: Upstream VAFT Sync

on:
  schedule:
    - cron: "19 7 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: upstream-vaft-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Update VAFT bundle
        run: ./scripts/update-vaft.sh

      - name: Detect bundle changes
        id: changes
        run: |
          if git diff --quiet -- extension/injected/vaft.js extension/injected/upstream.txt; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build extension zip
        if: steps.changes.outputs.changed == 'true'
        run: ./scripts/build-zip.sh

      - name: Upload extension artifact
        if: steps.changes.outputs.changed == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: twitch-ads-blocker-extension
          path: dist/twitch-ads-blocker-extension.zip

      - name: Create pull request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "update vaft engine"
          branch: "automation/update-vaft"
          delete-branch: true
          title: "Update VAFT engine"
          body: |
            Automated update generated by `.github/workflows/upstream-sync.yml`.

            Changes:
            - run `./scripts/update-vaft.sh`
            - refresh `extension/injected/vaft.js`
            - refresh `extension/injected/upstream.txt`
